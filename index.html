<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>억비비의 라면가게</title>

<style>
body{
    margin:0;
    background:#ffe4b5;
    font-family:'Malgun Gothic';
    user-select:none;
}

h1{
    text-align:center;
    margin:10px;
    color:#d35400;
}

#top{
    width:1000px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:24px;
    font-weight:bold;
}

#game{
    width:1000px;
    margin:20px auto;
    display:flex;
    justify-content:space-between;
}

#ingredients{
    width:180px;
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.item{
    background:#ffcc80;
    margin:10px 0;
    padding:15px;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
    font-weight:bold;
}

.item:hover{
    background:#ffb74d;
}

#pots{
    width:760px;
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:30px;
}

.pot{
    width:320px;
    height:220px;
    background:#555;
    border-radius:20px;
    position:relative;
    overflow:hidden;
    cursor:pointer;
}

.water{
    position:absolute;
    bottom:0;
    width:100%;
    height:0%;
    background:#64b5f6;
    transition:0.2s;
}

.noodle{
    position:absolute;
    width:80%;
    height:40px;
    background:gold;
    border-radius:50%;
    left:10%;
    top:90px;
    display:none;
}

.status{
    position:absolute;
    top:10px;
    width:100%;
    text-align:center;
    color:white;
    font-weight:bold;
}

.boil{
    animation: boil 0.3s infinite alternate;
}

@keyframes boil{
    from{transform:translateY(0);}
    to{transform:translateY(-3px);}
}

.burn{
    background:#111 !important;
}

#message{
    text-align:center;
    font-size:28px;
    margin-top:20px;
    color:#c0392b;
}
</style>
</head>

<body>

<h1>🍜 억비의 라면 가게 🍜</h1>

<div id="top">
    <div>💰 돈 : <span id="money">0</span>원</div>
    <div>⏰ 시간 : <span id="time">60</span>초</div>
</div>

<div id="game">

    <div id="ingredients">
        <div class="item" onclick="selectItem('water')">💧 물</div>
        <div class="item" onclick="selectItem('ramen')">🍜 라면</div>
        <div class="item" onclick="selectItem('soup')">🧂 스프</div>
        <div class="item" onclick="selectItem('egg')">🥚 계란</div>
        <div class="item" onclick="selectItem('green')">🧅 캐비아</div>
    </div>

    <div id="pots"></div>

</div>

<div id="message">재료를 선택 후 냄비를 클릭하세요!</div>

<script>

const potsDiv = document.getElementById('pots');

let selected = null;
let money = 0;
let time = 60;

document.getElementById('money').innerText = money;

function selectItem(item){
    selected = item;
    document.getElementById('message').innerText =
        item + " 선택!";
}

class Pot{
    constructor(index){
        this.index = index;

        this.water=false;
        this.ramen=false;
        this.soup=false;
        this.egg=false;
        this.green=false;

        this.boiling=false;
        this.burned=false;
        this.done=false;

        this.time=0;

        this.element=document.createElement('div');
        this.element.className='pot';

        this.status=document.createElement('div');
        this.status.className='status';

        this.waterDiv=document.createElement('div');
        this.waterDiv.className='water';

        this.noodle=document.createElement('div');
        this.noodle.className='noodle';

        this.element.appendChild(this.waterDiv);
        this.element.appendChild(this.noodle);
        this.element.appendChild(this.status);

        this.element.onclick=()=>this.click();

        potsDiv.appendChild(this.element);

        setInterval(()=>this.update(),100);
    }

    click(){

        if(this.burned)return;

        if(selected==='water' && !this.water){
            this.water=true;
            this.waterDiv.style.height='50%';
            this.status.innerText='물';
        }

        else if(selected==='ramen' && this.water){
            this.ramen=true;
            this.noodle.style.display='block';
            this.status.innerText='면';
        }

        else if(selected==='soup' && this.ramen){
            this.soup=true;
            this.status.innerText='스프';
        }

        else if(selected==='egg' && this.boiling){
            this.egg=true;
            this.status.innerText='계란';
        }

        else if(selected==='green' && this.boiling){
            this.green=true;
            this.status.innerText='캐비아아';
        }

        else if(selected===null && this.done){
            this.serve();
        }

    }

    update(){

        if(this.water && this.ramen && this.soup && !this.done){

            this.time += 0.1;

            if(this.time > 3 && !this.boiling){
                this.boiling=true;
                this.element.classList.add('boil');
                this.status.innerText='끓는 중!';
            }

            if(this.time > 6){
                this.burn();
            }

            if(this.boiling && this.egg && this.green){
                this.done=true;
                this.status.innerText='완성!';
            }
        }
    }

    serve(){

        let score=300;

        if(this.done){
            score=1000;
        }

        money += score;

        document.getElementById('money').innerText=money;

        document.getElementById('message').innerText =
            score + "원 획득!";

        this.reset();
    }

    burn(){
        this.burned=true;
        this.element.classList.remove('boil');
        this.element.classList.add('burn');
        this.status.innerText='탐!!!';
    }

    reset(){

        this.water=false;
        this.ramen=false;
        this.soup=false;
        this.egg=false;
        this.green=false;

        this.boiling=false;
        this.burned=false;
        this.done=false;

        this.time=0;

        this.waterDiv.style.height='0%';
        this.noodle.style.display='none';

        this.element.classList.remove('boil');
        this.element.classList.remove('burn');

        this.status.innerText='';
    }
}

for(let i=0;i<4;i++){
    new Pot(i);
}

setInterval(()=>{

    time--;

    document.getElementById('time').innerText=time;

    if(time<=0){

        if(money>=10000){
            alert("🎉 성공! 슈가 끓여준 라면이 최고야!");
        }else{
            alert("😭 실패! 넌 설거지나 해!");
        }

        location.reload();
    }

},1000);

</script>

</body>
</html>
